x-demo-jwt: &demo-jwt
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?Copy .env.example to .env or set JWT_PRIVATE_KEY}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?Copy .env.example to .env or set JWT_PUBLIC_KEY}
  JWT_ISSUER: ${JWT_ISSUER:-aura-auth}

services:
  aura-auth-db:
    image: postgres:16-alpine
    container_name: aura-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-aura}
      POSTGRES_USER: ${AUTH_DB_USER:-aura}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-aura}
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - aura-auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-aura} -d ${AUTH_DB_NAME:-aura}"]
      interval: 5s
      timeout: 5s
      retries: 12

  aura-core-db:
    image: postgres:16-alpine
    container_name: aura-core-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CORE_DB_NAME:-aura}
      POSTGRES_USER: ${CORE_DB_USER:-aura}
      POSTGRES_PASSWORD: ${CORE_DB_PASS:-aura}
    ports:
      - "${CORE_DB_PORT:-5433}:5432"
    volumes:
      - aura-core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CORE_DB_USER:-aura} -d ${CORE_DB_NAME:-aura}"]
      interval: 5s
      timeout: 5s
      retries: 12

  aura-analysis:
    build:
      context: ./aura-analysis
      dockerfile: Dockerfile
      args:
        RUBERT_MODEL_NAME: ${RUBERT_MODEL_NAME:-cointegrated/rubert-tiny2}
    container_name: aura-analysis
    restart: unless-stopped
    environment:
      APP_NAME: ${ANALYSIS_APP_NAME:-aura-analysis-service}
      APP_PORT: ${ANALYSIS_APP_PORT:-8090}
      ANALYSIS_MODE: ${ANALYSIS_MODE:-RUBERT_EMBEDDINGS}
      MODEL_VERSION: ${ANALYSIS_MODEL_VERSION:-rule-based-0.1.0}
      RUBERT_MODEL_NAME: ${RUBERT_MODEL_NAME:-cointegrated/rubert-tiny2}
      RUBERT_SENTIMENT_CLASSIFIER_PATH: ${RUBERT_SENTIMENT_CLASSIFIER_PATH:-app/ml/artifacts/rubert_sentiment_classifier.joblib}
      RUBERT_TOPIC_CLASSIFIER_PATH: ${RUBERT_TOPIC_CLASSIFIER_PATH:-app/ml/artifacts/rubert_topic_classifier.joblib}
      RUBERT_METADATA_PATH: ${RUBERT_METADATA_PATH:-app/ml/artifacts/rubert_metadata.json}
      LOG_LEVEL: ${ANALYSIS_LOG_LEVEL:-INFO}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-2.5-flash-lite}
      GOOGLE_AI_URL: ${GOOGLE_AI_URL:-https://generativelanguage.googleapis.com/v1beta/models}
      SUMMARY_MAX_INPUT_LENGTH: ${SUMMARY_MAX_INPUT_LENGTH:-20000}
      SUMMARY_MAX_OUTPUT_CHARS: ${SUMMARY_MAX_OUTPUT_CHARS:-700}
      INSIGHTS_MAX_INPUT_CHARS: ${INSIGHTS_MAX_INPUT_CHARS:-12000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "8090:8090"

  aura-auth:
    build:
      context: .
      dockerfile: aura-auth/Dockerfile
    container_name: aura-auth
    restart: unless-stopped
    depends_on:
      aura-auth-db:
        condition: service_healthy
    environment:
      APP_NAME: ${AUTH_APP_NAME:-aura-auth-service}
      SERVER_PORT: ${AUTH_SERVER_PORT:-8080}
      DB_URL: jdbc:postgresql://aura-auth-db:5432/${AUTH_DB_NAME:-aura}?currentSchema=aura_auth
      DB_USER: ${AUTH_DB_USER:-aura}
      DB_PASS: ${AUTH_DB_PASS:-aura}
      <<: *demo-jwt
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LOGGING_LEVEL_DEFAULT: ${AUTH_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8080:8080"

  aura-core:
    build:
      context: .
      dockerfile: aura-core/Dockerfile
    container_name: aura-core
    restart: unless-stopped
    depends_on:
      aura-core-db:
        condition: service_healthy
      aura-analysis:
        condition: service_healthy
    environment:
      APP_NAME: ${CORE_APP_NAME:-aura-core-service}
      SERVER_PORT: ${CORE_SERVER_PORT:-8081}
      DB_URL: jdbc:postgresql://aura-core-db:5432/${CORE_DB_NAME:-aura}?currentSchema=aura_core
      DB_USER: ${CORE_DB_USER:-aura}
      DB_PASS: ${CORE_DB_PASS:-aura}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?Copy .env.example to .env or set JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-aura-auth}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      ANALYSIS_SERVICE_URL: ${ANALYSIS_SERVICE_URL:-http://aura-analysis:8090}
      LOGGING_LEVEL_DEFAULT: ${CORE_LOG_LEVEL:-INFO}
      HIBERNATE_SHOW_SQL: ${HIBERNATE_SHOW_SQL:-false}
      HIBERNATE_FORMAT_SQL: ${HIBERNATE_FORMAT_SQL:-false}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8081:8081"

  aura-frontend:
    build:
      context: ./aura-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-http://localhost:8080}
    container_name: aura-frontend
    restart: unless-stopped
    depends_on:
      aura-auth:
        condition: service_healthy
      aura-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "5173:80"

volumes:
  aura-auth-db-data:
  aura-core-db-data:
