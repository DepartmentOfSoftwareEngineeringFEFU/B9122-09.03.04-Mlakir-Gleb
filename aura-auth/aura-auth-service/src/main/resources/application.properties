#
# Auth
#
aura.security.jwt.signing.private-key=${JWT_PRIVATE_KEY}
aura.security.jwt.verification.public-key=${JWT_PUBLIC_KEY}

aura.security.jwt.signing.access-token-expiration-seconds=${ACCESS_TOKEN_EXPIRATION_SECONDS:300}
aura.security.jwt.signing.refresh-token-expiration-seconds=${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}

aura.security.jwt.signing.jwt-issuer=${JWT_ISSUER:aura-auth}
aura.security.jwt.verification.jwt-issuer=${JWT_ISSUER:aura-auth}
aura.security.jwt.signing.default-role=${JWT_DEFAULT_USER_ROLE:ROLE_USER}

aura.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
aura.security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
aura.security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
aura.security.cors.max-age=${CORS_PREFLIGHT_MAX_AGE:3600}
#
# Spring
#
spring.application.name=${APP_NAME:@project.artifactId@}
spring.application.description=${APP_DESCR:AURA auth service}
spring.application.version=${APP_VERSION:@project.version@}
server.port=${SERVER_PORT:8080}
#
# Database
#
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/${DB_NAME:aura}?currentSchema=aura_auth}
spring.datasource.username=${DB_USER:aura}
spring.datasource.password=${DB_PASS:aura}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.check_nullability=true
spring.jpa.properties.hibernate.hbm2ddl.auto=validate
#
# Liquibase
#
spring.liquibase.enabled=true
spring.liquibase.liquibase-schema=public
spring.liquibase.database-change-log-table=prfx_auth_log
spring.liquibase.database-change-log-lock-table=prfx_auth_lock
spring.liquibase.change-log=classpath:db/changelog.yaml
#
# Logging
#
logging.level.root=${LOGGING_LEVEL_DEFAULT:INFO}
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.org.postgresql=WARN
logging.level.org.apache.tomcat.util=WARN
